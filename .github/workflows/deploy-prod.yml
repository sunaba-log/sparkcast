# main への push で Cloud Run（prod 環境 / sunabalog-prod）へビルド・デプロイする。
# GCP 認証は prod プロジェクトの Workload Identity Federation を使う。
name: deploy-prod

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  PROJECT_ID: sunabalog-prod
  REGION: asia-northeast1
  SERVICE: podcast-ui-prod
  IMAGE: asia-northeast1-docker.pkg.dev/sunabalog-prod/podcast-ui/podcast-ui
  WORKLOAD_IDENTITY_PROVIDER: projects/697315992056/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
  DEPLOYER_SA: podcast-ui-deployer@sunabalog-prod.iam.gserviceaccount.com
  # Firebase Web SDK の公開設定値（本番、ビルド時にバンドルへ埋め込まれる）
  NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCOe16OGUrP1qWtJTKlatf5gbuKRdiLDg8
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: sunabalog-prod.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: sunabalog-prod
  FIREBASE_AUTH_HELPER_DOMAIN: sunabalog-prod.firebaseapp.com

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg FIREBASE_AUTH_HELPER_DOMAIN="$FIREBASE_AUTH_HELPER_DOMAIN" \
            -t "$IMAGE:${{ github.sha }}" .

      - name: Push image
        run: docker push "$IMAGE:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          SUFFIX="sha-${GITHUB_SHA::8}-${GITHUB_RUN_NUMBER}"
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE:${{ github.sha }}" \
            --revision-suffix "$SUFFIX" \
            --no-traffic
          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --to-revisions "${SERVICE}-${SUFFIX}=100"
