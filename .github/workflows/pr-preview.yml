# PR ごとのプレビュー環境。pr-<番号> のタグ付きリビジョンとしてデプロイし
# （本番トラフィックには乗せない）、プレビュー URL を PR にコメントする。
# PR クローズ時にタグを削除する。
name: pr-preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
    paths:
      - "ui/**"
      - ".github/workflows/pr-preview.yml"

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PROJECT_ID: sunabalog-dev
  REGION: asia-northeast1
  SERVICE: podcast-ui-dev
  IMAGE: asia-northeast1-docker.pkg.dev/sunabalog-dev/podcast-ui/podcast-ui
  WORKLOAD_IDENTITY_PROVIDER: projects/452347646684/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
  DEPLOYER_SA: github-actions-deployer@sunabalog-dev.iam.gserviceaccount.com
  CLOUD_SQL_INSTANCE_CONNECTION_NAME: sunabalog-dev:asia-northeast1:podcast-automator-postgres-dev
  DB_PASSWORD_SECRET: db-password
  TAG: pr-${{ github.event.pull_request.number }}
  # Firebase Web SDK の公開設定値（ビルド時にバンドルへ埋め込まれる）
  NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCBsZ7_ZC0fin7XpPxgborVu_73zUidJkI
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: sunabalog-dev.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: sunabalog-dev
  FIREBASE_AUTH_HELPER_DOMAIN: sunabalog-dev.firebaseapp.com

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # プレビューは dev DB を共有するため、新しいコードを配信する前に
      # DB スキーマを収束させる（cd.yml と同一手順・Cloud SQL Connector 経由）。
      # マージ前の PR のスキーマ変更が dev DB へ先行適用されることを許容する運用。
      # マイグレーションは追加のみ・冪等に作る（migrations/README 運用に従う）。
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run migrations
        working-directory: ui
        run: |
          npm ci
          export GOOGLE_CLOUD_PROJECT="$PROJECT_ID"
          export DB_NAME=podcast
          export DB_USER=podcast_app
          export DB_PASSWORD="$(gcloud secrets versions access latest --secret="$DB_PASSWORD_SECRET" --project="$PROJECT_ID")"
          npm run db:migrate

      - name: Build image
        working-directory: ui
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg FIREBASE_AUTH_HELPER_DOMAIN="$FIREBASE_AUTH_HELPER_DOMAIN" \
            -t "$IMAGE:$TAG" .

      - name: Push image
        run: docker push "$IMAGE:$TAG"

      - name: Deploy preview revision (no traffic)
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE:$TAG" \
            --no-traffic \
            --tag "$TAG"

      - name: Get preview URL
        id: url
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --format json | jq -r --arg tag "$TAG" '.status.traffic[] | select(.tag == $tag) | .url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # プレビューの動的ホスト名を Firebase Auth の認可ドメインへ自動登録する
      # （PR ごとの手作業を不要にする。PR クローズ時に cleanup 側で削除）。
      - name: Authorize preview domain (Firebase Auth)
        # 認可ドメイン登録は best-effort（deployer SA に firebaseauth.admin が
        # 付与されるまでは失敗し得るが、プレビュー配信自体は止めない）。
        continue-on-error: true
        run: |
          HOST="$(echo '${{ steps.url.outputs.url }}' | sed -E 's#^https?://##; s#/.*##')"
          if [ -n "$HOST" ]; then
            python3 .github/scripts/firebase_authorized_domain.py add "$PROJECT_ID" "$HOST"
          fi

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.url.outputs.url }}';
            const marker = '<!-- pr-preview-url -->';
            const body = `${marker}\n🚀 プレビュー環境をデプロイしました: ${url}\n\n（commit: ${context.sha.slice(0, 7)} / このリビジョンには本番トラフィックは流れません）`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve preview URL
        id: url
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --format json | jq -r --arg tag "$TAG" '.status.traffic[] | select(.tag == $tag) | .url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # デプロイ時に登録したプレビュードメインの認可を解除する
      - name: Deauthorize preview domain (Firebase Auth)
        if: steps.url.outputs.url != ''
        continue-on-error: true
        run: |
          HOST="$(echo '${{ steps.url.outputs.url }}' | sed -E 's#^https?://##; s#/.*##')"
          python3 .github/scripts/firebase_authorized_domain.py remove "$PROJECT_ID" "$HOST"

      - name: Remove preview tag
        run: |
          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --remove-tags "$TAG" || echo "tag not found; skipping"
