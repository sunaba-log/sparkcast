# PR ごとのプレビュー環境。pr-<番号> のタグ付きリビジョンとしてデプロイし
# （本番トラフィックには乗せない）、プレビュー URL を PR にコメントする。
# PR クローズ時にタグを削除する。
name: pr-preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PROJECT_ID: sunabalog-dev
  REGION: asia-northeast1
  SERVICE: podcast-ui-dev
  IMAGE: asia-northeast1-docker.pkg.dev/sunabalog-dev/podcast-ui/podcast-ui
  WORKLOAD_IDENTITY_PROVIDER: projects/452347646684/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
  DEPLOYER_SA: podcast-ui-deployer@sunabalog-dev.iam.gserviceaccount.com
  TAG: pr-${{ github.event.pull_request.number }}
  # Firebase Web SDK の公開設定値（ビルド時にバンドルへ埋め込まれる）
  NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCBsZ7_ZC0fin7XpPxgborVu_73zUidJkI
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: sunabalog-dev.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: sunabalog-dev
  FIREBASE_AUTH_HELPER_DOMAIN: sunabalog-dev.firebaseapp.com

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg FIREBASE_AUTH_HELPER_DOMAIN="$FIREBASE_AUTH_HELPER_DOMAIN" \
            -t "$IMAGE:$TAG" .

      - name: Push image
        run: docker push "$IMAGE:$TAG"

      - name: Deploy preview revision (no traffic)
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE:$TAG" \
            --no-traffic \
            --tag "$TAG"

      - name: Get preview URL
        id: url
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --format json | jq -r --arg tag "$TAG" '.status.traffic[] | select(.tag == $tag) | .url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.url.outputs.url }}';
            const marker = '<!-- pr-preview-url -->';
            const body = `${marker}\n🚀 プレビュー環境をデプロイしました: ${url}\n\n（commit: ${context.sha.slice(0, 7)} / このリビジョンには本番トラフィックは流れません）`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Remove preview tag
        run: |
          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --remove-tags "$TAG" || echo "tag not found; skipping"
