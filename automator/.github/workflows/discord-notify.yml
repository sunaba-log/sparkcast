name: Discord Notification

on:
  issues:
    types: [assigned]
  issue_comment:
    types: [created]
  pull_request:
    types: [review_requested]
  pull_request_review_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: read
    steps:
      - name: Build and send Discord message
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_ACTIVITY_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, subprocess, urllib.request

          USER_MAP = {
              "k0heik": "1444623950364803138",
              "KenTakashima": "847084559065808947",
              "otaka44": "442619994614792203",
          }

          event_name = os.environ["GITHUB_EVENT_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]

          with open(os.environ["GITHUB_EVENT_PATH"]) as f:
              event = json.load(f)

          action = event.get("action", "")
          usernames = []
          url = ""
          label = ""

          if event_name == "issues" and action == "assigned":
              issue_number = event["issue"]["number"]
              url = event["issue"]["html_url"]
              label = f"Issue アサイン: #{issue_number} {event['issue']['title']}"

              token = os.environ.get("GITHUB_TOKEN", "")
              api_url = f"https://api.github.com/repos/{repo}/issues/{issue_number}/events?per_page=100"
              req = urllib.request.Request(api_url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  issue_events = json.loads(resp.read())

              assigned_events = [
                  e for e in issue_events
                  if e.get("event") == "assigned"
                  and e.get("assignee", {}).get("login")
              ]
              if assigned_events:
                  latest_time = assigned_events[-1]["created_at"]
                  usernames = [
                      e["assignee"]["login"]
                      for e in assigned_events
                      if e["created_at"] == latest_time
                  ]
              else:
                  usernames = [event["assignee"]["login"]]

          elif event_name == "issue_comment" and action == "created":
              body = event["comment"]["body"]
              usernames = [u for u in re.findall(r'@(\w+)', body) if u in USER_MAP]
              url = event["comment"]["html_url"]
              label = f"コメントでメンション (#{event['issue']['number']})"

          elif event_name == "pull_request" and action == "review_requested":
              pr_number = event["pull_request"]["number"]
              url = event["pull_request"]["html_url"]
              label = f"PR レビュー依頼: #{pr_number} {event['pull_request']['title']}"

              # GitHub API でイベント履歴を取得し、同じタイムスタンプのreview_requestedを全て通知
              # (UIで複数同時追加した場合も1イベントしか飛ばないケースに対応)
              token = os.environ.get("GITHUB_TOKEN", "")
              api_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/events?per_page=100"
              req = urllib.request.Request(api_url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  issue_events = json.loads(resp.read())

              review_events = [
                  e for e in issue_events
                  if e.get("event") == "review_requested"
                  and e.get("requested_reviewer", {}).get("login")
              ]
              if review_events:
                  latest_time = review_events[-1]["created_at"]
                  usernames = [
                      e["requested_reviewer"]["login"]
                      for e in review_events
                      if e["created_at"] == latest_time
                  ]
              else:
                  reviewer = event.get("requested_reviewer") or {}
                  usernames = [reviewer["login"]] if reviewer.get("login") else []

          elif event_name == "pull_request_review_comment" and action == "created":
              body = event["comment"]["body"]
              usernames = [u for u in re.findall(r'@(\w+)', body) if u in USER_MAP]
              url = event["comment"]["html_url"]
              label = f"PR コメントでメンション (#{event['pull_request']['number']})"

          mentions = " ".join(f"<@{USER_MAP[u]}>" for u in usernames if u in USER_MAP)
          if not mentions:
              print("No mentions found, skipping.")
              exit(0)

          content = f"{mentions} [{repo}] {label}\n{url}"
          data = json.dumps({"content": content}).encode()
          webhook_url = os.environ["DISCORD_WEBHOOK_URL"].strip()
          result = subprocess.run(
              ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "-X", "POST", webhook_url,
               "-H", "Content-Type: application/json",
               "-d", json.dumps({"content": content})],
              capture_output=True, text=True
          )
          status = result.stdout.strip()
          if status not in ("200", "204"):
              raise RuntimeError(f"Discord returned HTTP {status}: {result.stderr}")
          print(f"Sent: {content}")
          PYEOF
