# PRがマージされたとき、PR bodyの close/fix/resolve キーワードから
# リンクされたissueを自動的にクローズする。
name: Close linked issues on PR merge

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: read
  issues: write

jobs:
  close_issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close linked issues from PR body
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const pattern = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/ig;
            const numbers = new Set();
            let match;

            while ((match = pattern.exec(body)) !== null) {
              numbers.add(Number(match[1]));
            }

            if (numbers.size === 0) {
              core.info("No linked issue keywords found in PR body.");
              return;
            }

            for (const issue_number of numbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                });

                if (issue.pull_request) {
                  core.info(`#${issue_number} is a pull request. Skipped.`);
                  continue;
                }

                if (issue.state === "closed") {
                  core.info(`#${issue_number} is already closed.`);
                  continue;
                }

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  state: "closed",
                  state_reason: "completed",
                });

                core.info(`Closed issue #${issue_number}.`);
              } catch (error) {
                core.warning(`Failed to process #${issue_number}: ${error.message}`);
              }
            }
